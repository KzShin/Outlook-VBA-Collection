# ==============================================================================
# Outlook VBA 統合設定ファイル
# 保存先: %APPDATA%\OutlookVBA\config.ini
# 文字コード: UTF-8
# ==============================================================================

[General]
# [共通] 7-Zipの実行ファイルパス
# modLogger, modSendController, modMailSevenZip で使用されます。
SevenZipPath=C:\Program Files\7-Zip\7z.exe

[Logger]
# [共通] ログの保存設定
# 保存先フォルダ
LogDir=%APPDATA%\OutlookVBA\logs
# 何日経過したログをZIP圧縮するか
ArchiveDays=7

[SendController]
# [誤送信防止] 送信保留する祝日リスト (MM-DD形式, カンマ区切り)
HolidayList=12-29,12-30,12-31,01-01,01-02,01-03

# [追加] 業務開始時間（兼 翌営業日の予約送信時刻）
WorkStartTime=08:00

# [追加] 業務終了時間（この時間以降の送信は翌営業日扱いで提案）
WorkEndTime=18:00

[AutoFlag]
# [自動フラグ] 自分のメールアドレス（To/CC判定用）
MyAddress=taro.yamada@example.com
# フラグ対象キーワード（正規表現）
Pattern=重要|緊急|要回答|期限
# 除外する件名（カンマ区切り）
ExcludeSubjects=日報,通知,自動応答

[LaunchOWA]
# [OWA起動] Web版OutlookのURL
# 法人用(M365): https://outlook.office.com/mail/
# 個人用(Live): https://outlook.live.com/mail/
BaseUrl=https://outlook.office.com/mail/